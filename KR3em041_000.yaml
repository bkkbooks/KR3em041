body:
  text: 喉部論喉症喉痹一症在古方書雖有十八證之辨古人悉指為相火然此症雖多由火而復有非火證不可不詳察也蓋火有真假凡實火可清者即真火證也虛火不宜清者即水虧證也且復有陰盛格陽者即真陰證也故內經曰太陽在泉寒淫所勝民病嗌病頷腫其義即此何後人之弗究也一喉痹所屬諸經凡少陽少陰陽明厥陰皆有此症具列於後但其中虛實各有不同蓋少陽厥陰為木火之臟固多熱症陽明為水穀之海胃氣直透咽喉故又言陽明之火為最盛欲辨此者但察其情志鬱怒而起者多屬少陽厥陰因口腹過嗜肥甘辛熱而起者多屬陽明凡患此者多宜以實火論治至若少陰之疾則非此之比蓋少陰之脈始於橫骨終於會厭繫於舌本凡陰火遂衝於上多為喉痹但少陰之火有虛有實不得類從火斷若果因實火自有火症火脈現出亦易知也若因酒色過度以致真水虧損者此腎中之虛火證也非壯水不可又有火虛於下而格陽於上此無根之火即腎中之真寒證也非溫補命門不可凡此諸經不同而虛實大異皆後人所罕知獨褚氏遺之有上病察下之說誠見道之言也一喉痹症總治之火則名目雖多似有不必盡辨者然亦有不可不辨者即如單雙乳鵝及單雙纏喉症之有不同也蓋腫於咽之兩旁者為雙鵝腫於一邊者為單鵝此其形必圓突如珠乃癰癤之類結於喉間故多至出毒或宜刺出血而愈者若纏喉風則滿喉紅腫多不成膿亦不必出血但使火降其腫自消此其所以有異而治之亦當有法也喉症總論夫喉症者人之一身總關之際也內通五臟六腑外傳五音五色乃氣息出入之門聲音傳送之所飲食往來必經之路此乃真真總關之際也諺云一指痛滿身疾何況乎咽喉蓋喉症所發原由多因人之本性發來或好食煎炒或恣味辛酸或淫欲無節或喜怒不常或勞神過度或耽於色或過飲酒好勇鬥狠皆能致疾既未能謹節於平日又不能急治於患後日積月纍其病根蒂深固則牢不可拔矣若夫好食酸則傷肝好食辣則傷肺好食甜則傷脾好食苦則傷心好食鹹則傷腎好食冷則內熱好食熱則內寒此因飲食傷臟而發喉症者也夫喉症發於內左屬肝右屬肺舌屬心唇屬脾齒屬腎如肝病則聲悲肺病則聲速心病則聲雄脾病則聲緩腎病則聲沉此屬於臟大腸病也蓋大腸病則聲長小腸病則聲短胃病則聲連膽病則聲清膀胱病則聲微三焦無病乃寄之名此屬於腑五臟六腑發於喉皆由內而發外者也然發形於外者有虛有實之分有緊有緩之說有陰有陽之症有紅有腫之形有有痰者有無痰者有熱者有寒者有紅黃青白黑點者有氣急咳嗽者有聲啞音嘶者有痰響如雷者有氣響似鋸者有牙關緊急者有氣出不收者有鼻內出血不止者有耳內出膿血者有口舌生瘡者有斑似胎癬而虆若蝦皮者有一二或數根肉筍長短生來而針刺不忍痛者有滿喉並無紅黃白青黑點而痛不能進膳食者舌有硬亦有軟者有內紅腫而外不紅腫者有外腫而內不腫者有口唇粗厚而齒腳肉包牙齒者有舌下生舌而正舌捲入內向者有鼻生瘜肉而喉內上面生肉核者有滿口形似熟瘦豬肉而乾焦者有喉痛而鼻出紅黃血水者有舌硬如石三兩載而失舌者有面暗神慘欲言而不能言者有舌下發子弟瘡而升提毒於喉中生白膜者有發痰火積久燒咽喉而鏡上生紅絲線並無白膜者有左右扯開而失腣中子者有口眼喎斜怒目直視者有舌出齒外而不能收入者有舌藏內關而不能伸出外節者有右傳左者其病重有左傳右者其病輕有牙床發痛而久出膿血者有齒角生瘡而至內穿者有腣中子長大而滿口鮮紅色者有開口臭而呼吸氣臭者有內外結核出膿血而不腥臭者有朝發夕愈而腹肚作痛者有舌粗硬寸余滿口不能通活者有大便閉結而小便澀數者有遍身軟痛手不能提足不能步者有久患瘰癧積熱而伏於咽喉者有內傷吐血陰火伏於喉中作痛者有風熱驟傷而忽然食惡物以發者有婦女經水不調下閉忽送上升而致喉內作痛者有犯夢遺日久水衰火動而致口內作痛者有雙松虆單松虆雙燕子單燕子雙鵝喉單鵝喉雙纏單纏懸蜞合架壙音𥅻墶瘰癧乘枕乘癤鬥底必胲聯珠破頭掩頭大頭穿額魚鱗玉筍蓮花梅花黑疔搶食木舌重舌痗舌回舌舌癰驢嘴魚口喉癰喉疔喉箭喉痹剪喉牙癰牙疔牙疳肥豬鵝口胎毒鎖子等症此上症雖多端治法惟可升提驅風發散解毒清涼切不可攻下通利及補托熱燥收斂之藥經云毒在咽喉猶有救毒歸臟腑病難全諸症皆從臟腑發醫從臟腑治其源內外經絡能兼治不是仙來也是仙辨喉症經絡治法夫咽喉者乃人飲食呼吸之門聲音吐納之路此關一身害人迅速醫者不明誤人更不可勝計蓋口者脾之竅口唇焦乾為脾熱焦而紅者吉焦而黑者凶若口唇紅腫極熱也口唇青白極冷也口爛舌乾心熱也口咽乾焦欲飲水者陽明之熱也口噤難言者風熱閉竅也口涎流而唇色紫者胃氣虛也肚痛口吐涎水者蟲積也如唇嘴反青黧黑直如魚口氣急不收口唇顫動搖頭不止皆是不治之症然口為脾竅舌為心苗口養精液須通五氣五氣者五臟之氣也然臟熱則口苦臟寒則口咸虛則口淡冷則口甜宿食則口酸虛熱煩燥則口澀腥臭之氣蘊結於胸臆之中發衝於外則口臭氣滯加之風熱勞郁之毒則口舌生瘡法當清胃瀉火為主假如喉內左邊先起或紅或白或黃或黑或有膜無膜有核無核此皆屬肝經發來之毒風熱當用甘桔湯加柴胡白芍為君實熱加生地丹皮膽草為佐痰涎壅盛加連翹蒡子花粉有膜則用蟬蛻有核用獨活丹皮初起有潮熱則用防風荊芥薄荷虛熱用元參為君倘或右邊先起其色或紅或黃或白或黑有膜無膜或有核無核皆是屬肺經發來之風熱毒當用黃芩桑白皮為君實熱則加生地丹皮羚羊痰涎壅盛有膜及有潮熱虛熱用藥同上如在腣中上下舌根左右起者其色或紅黃青白黑不等此屬心經發來之風熱毒當用川連梔子舌硬用羚羊犀角痰涎壅盛有膜有潮熱用藥俱同上左齒上大齒屬膽加膽草左下大齒屬肝加柴胡白芍右上大齒屬大腸加枳殼杏仁右下大齒屬肺加黃芩桑皮當中上四齒屬心加黃連犀角當中下四齒屬腎加黃柏知母上兩旁屬胃加川芎白芷下兩旁屬脾加蒼朮白朮若其滿喉發來色黃者此乃脾家發來濕毒亦當燥脾驅風除濕解毒其有滿喉黑色者此屬腎經發來之毒其毒久積元氣損傷津液敗壞精神傾散勞神過度所致是乃險症也其有喉內二三肉筍滿口乾渴失音舌脫等症皆系毒氣攻臟所致此等症候千人犯著千人死靈丹百救無一生不可不知之喉科辨症雙松虆症此症發於喉鏡內左右俱有形如松虆樣先起三五白點黃點後湊成一個未開花者可治已開花者切勿輕醫治當平肝清肺驅風解毒宜用生地六味加防風荊芥薄荷蟬蛻等藥內吹以玉龍散單松虆症此症喉鏡內起一片或左或右形如松虆樣初起三五黃點白點後湊成一個未開花者可治已開花者難醫左起治宜平肝當用柴胡白芍右起治宜清肺當用黃芩桑皮仍加入升提驅風發散解毒去膜之藥內吹玉龍散雙燕子症此症發在喉中之顎左右俱有滿口紅腫形如燕子伏梁頭向上尾向下其尾開有兩片其膜色白黃紅頭向出者可治向入者難痊若色黑者不治治法用甘桔湯加平肝清肺去膜解毒消風升提之藥內則用玉龍散吹之單燕子症此症發在喉內或左或右單起一片形似燕子仍有白膜黃膜起治法左平肝右清肺余與雙燕子同頭向出尾向入者易治頭向入尾向出者難醫急宜用升提等藥治之緩則不救雙鵝症此症生於腣中左右俱有一片其形與腣中三花相類均結有核甚痛飲食皆不能下是屬陽症宜針刺患處出血並刺夾車少商兩穴惟有尖起者可用針刺不起尖者弗刺治法宜用散血活血等藥內則用玉龍散吹之如有潮熱者用甘桔湯加去風藥治之單鵝症此症與雙鵝相同惟或左或右單起一片飲食不能下咽治法左起平肝右起清肺並宜用針刺出毒血但患處起尖者可刺不起尖者勿刺余用藥同雙鵝雙纏症此症發時喉內四圍紅腫在腣中左右有白膜黃膜兩片屈曲相纏纏上者輕纏下者重若至日久則難治矣膜之邊弦上有紅絲絡者可治若透底黑者定死此是肝肺發來之陰毒治法不可大清宜用甘桔湯治之內則吹以玉龍散單纏症此症喉內四圍紅腫或於腣中左或於腣中右單起一片亦有白膜黃膜屈曲相纏纏上者輕纏下者重如脫後紅色者生黑熟色者死是為陰症不可大清治法宜用甘桔湯加升麻蟬蛻惟左起宜加柴胡白芍右起宜加黃芩桑皮懸蜞症此症發在腣中之前後左右形如蝴蜞一書云似魚膽懸懸浮起其色帶黑是乃心腎發來之毒治當用清心解毒升提涼血發散之藥不可針刺亦有用生地六味或八珍湯治之者合架症此症多因大笑大喊所致發在癤機左右先起滿口腫痛飲食不下三五日後合成衣架樣子其膜色黃白不等此乃肝肺所發之毒一二日內可治久則難治治法宜先在合車合谷少商穴刺出毒血少許再以清肺平肝發散解毒去膜之藥治之內吹以玉龍散壙墶症此症發在腣中內側壙音𥅻邊或左或右不定然俱有白膜黃膜若不細心看之不能見須將面掇起開關側目視之色黃白者易治熟黑者難醫發左則平肝發右則清肺治宜去膜升提驅風解毒之藥治之內則以玉龍散吹之瘰癧症此症繫頸上處處有核移毒於喉中左右內外其症從經絡發來屬火屬痰治法當化痰降火驅風解毒之藥外用沖和散敷之如膜白似豬油黑如墨染皆是不治之症乘枕症此症生於癤機前正對鼻孔緩緩發來形為橫枕其色黃白關閉涎盛痰多針刺無血出不痛者乃屬內傷肺竅宜用甘桔湯加減治之如鼻孔有血出及鼻塞頭痛目暈便是不治之症乘顎症此症發於上顎紅腫者多起白膜黃膜者少有核用針無核不刺驟發者易治緩發者難愈針刺痛有血者可治刺而不痛無血者不治此是心經發來即傷內臟之症治法用連翹消毒飲加秦艽防風荊芥鬥底症此症發在喉鏡鍋內即腣中內面初發時有寒熱鏡中有三五七白黑點子二三日白膜浮起對中胸前有毒氣二路橫過或直下是乃陰症由心發來者宜先用針刺其經絡去其毒血後治以升提解毒清心去膜消風之藥切不可攻下通利或用地黃散治之內則吹以玉龍散若痰不止氣響聲嘶聲啞者十不過救一二耳必胲症此症發於舌根下兩邊形如鈴子不摻開不見摻開舌根其形乃見不可針刺如誤刺破即不可治治法宜用甘桔湯加平肝清肺消風解毒活血化痰之藥聯珠症此症生於喉中或左或右單起一片有上下二個中心有紅絲透上下兩珠結成膿血穿後必連作一個仍有膿血出之可愈是屬陽症治宜左屬平肝右宜清肺當用甘桔湯加消風升提排膿解毒之藥破頭症此症發在喉鏡內核本一個卻破兩片其色黑熟口臭痰響聲啞是乃不治之症掩頭症此症發在喉中癤機上左右先結核結核後高尖處有白膜黃膜掩頭不可針刺此是肝肺發來之風熱毒治當清肺去膜之藥宜用甘桔湯加羌活防風服之最效大頭症此症因天時瘟疫瘴氣所發必大寒大熱口噤面黑四肢軟弱手不能提足不能舉頭大如斗氣大而緊急是乃三五日死之症切勿輕易醫治穿額症此症生於腣中前內向裡面有二三五黑點大似烏豆樣此是腎經傳來不治之症切勿妄治魚鱗症此症生於喉掩間形如松實樣若魚鱗向下聲啞色黑者不治玉筍症此症發在牙關牙床肉上形如三五肉筍徐徐發來針刺不痛此是臟腑內傷系不治之症蓮花症此症起在舌上生五七枝不定或具紅黃白等色形如蓮花相似不可針刺凡患是症潮熱必甚治用犀角地黃湯加梔子連翹蒡子花粉梅花症此症發來滿喉俱有紅黃白點形似梅花痰涎壅甚舌硬麵紅潮熱作渴是乃大熱之症治當清涼消風解毒去膜之藥內用玉龍散吹之黑疔症此症發在喉中左右舌俱黑色此乃腎經傳來不治之症患是症者必大寒大熱蓋傷色過度腎絶故也搶食症此症或發在喉中或發在舌上俱生紅疱患者必面色紫黑驟傷風熱喉內氣閉不能吞物治宜先用針刺出血後以生地黃湯加解毒湯之藥治之是乃誤食惡物之症久則難治也木舌症此症由心經大熱發來其舌紅腫強硬粗至寸余不能言語飲食痰涎壅甚宜用黃連消毒散加去風化痰除涎之藥治之如舌出齒外者不治重舌症此症發在舌底下重生一舌本舌強硬生來之舌亦硬如生得過長大者本舌捲入便飲食不能進此是心經發來熱毒治宜用黃連消毒散酌加解毒涼血之藥治之痗舌症此症生於舌之上下緩緩發來其舌粗硬如石結核成膿者可治如不結核口舌日見短小至二三年後舌忽失去則雖有靈丹不能治矣此是內傷心經之症如所爛之點黑色者亦不治回舌症此症發在舌上腫大強硬其舌尾捲入不能言語飲食亦不下咽此是心經發來之毒治法用犀角地黃湯加清心去痰解毒之藥服之舌癰症此症發在舌根舌底結核甚痛是乃陽症定要出膿後七日方愈此由心經發來之症治宜清心升提解毒清涼之藥驢嘴症此症發在上口唇對住人中先紅後黑滿身潮熱其症發之甚速此乃脾經發來之風熱毒當用甘桔湯加白芍並驅風解毒瀉脾之藥治之外以烏騮魚牙煅黑存性為末加冰片青黛蜜糖調塗之愈或用茶油調搽亦可魚口症此症發在口唇形如魚口氣出不臭痰涎不收是乃脾經發來熱毒上唇屬脾下唇屬胃治宜石膏白芍為主佐以清脾瀉胃之藥外用冰硼散塗之即愈喉癰症此症發在喉內或左或右單起一片耳底痛甚七日成膿是乃陽症治宜左平肝右清肺加以升提之藥治之喉疔症此症發於半頸喉內之中結核成膿不能針刺聽其膿自出但患是症者潮熱必甚治宜用甘桔湯加升提去風之藥喉箭症此症發在腣中左右有白路黃路頭大尾細直落喉下是乃險症最要謹慎治法宜用甘桔湯加升提之藥如毒以下肚氣響聲嘶者不治喉痹症此症生於喉中內隔發之甚速氣急而促飲食莫下茶入口中由鼻內出治宜升提消風解毒之藥治之剪喉症此症發在喉管內左右有核飲食莫進如面暗神慘頸腫氣響無痰目不轉眼者不治肥豬症此症發於兩牙關外面腫大內面腫色淡紅不結核治法內用玉龍散擦外用石灰調醋敷之即效或用虎骨磨醋塗之亦愈鵝口症此係胎內受毒發來之症小兒二三五歲之內常有患者是症發在口角口唇舌尾舌底下舌面上俱有白黃點兩牙關亦有點子高處起核可用針刺核出血後隨以銀花甘草泡水洗之或用五倍子煎洗亦可又方以前藥加硼砂明礬共研細末常擦之愈此症雖一二月猶可治胎毒症此症三五月及月內小兒皆有發者其症發來滿口白膜涎盛不收乍寒乍熱面色如黃紙滿身起紅黃爛點如肌膚脫落則不治是乃胎毒皆緣胎前不知謹節所致或未滿百日而服酸鹹之味並迭欲無狀喜怒不常皆能令子受患是症壯者宜解毒瀉胃火內以冰硼散吹之並用五倍子煎水京青布蘸洗口內鎖子症此症小兒百日內以及二三歲皆有發者發時滿口白膜黃膜涎盛面黃牙肉有白點要針刺放出黃水黃水出散其毒方治以甘桔湯等藥並用冰硼散吹之如舌尾下對中縫有白點黃點驟起而身壯者易治若久發起有黑紅並脫肌膚潮熱不退氣響聲啞者不治論症治法以上四十六症須細心辨認當清則清當補則補當提則提當瀉則瀉有風去風有潮熱去潮熱有涎除涎有痰化痰有膜去膜關閉關開其有白膜黃膜紅爛點子而氣不響聲不啞音不嘶語不亂喉不幹肚不痛口不噤言不狂眼不紅氣不躁目不直視神不暗慘大小便順利口臭無血胸不緊色不熟黑針刺有血者人雖傾危毒未攻臟藥尚能解以上壞症如患者兼有一二樣切勿妄治若主家再三哀懇卻情不過亦須言明此是不治之症今順情下藥功過皆在所弗受方可免怨也辨陽喉症訣夫陽喉者陽氣發顯於外也其色紅其氣滾熱其舌強硬其胸緊氣急大便堅硬小便澀數其面必紅其內外紅腫之處必大熱其口氣必滾熱而臭其眼內必紅其喉鏡內必起紅絲線經絡其口唇必紅而粗厚其陽分發熱潮熱必甚其痰涎壅甚其言語雄壯其聲怒則其症實乃陽喉也可用清心平肝瀉脾寒涼之藥治之辨陰喉症訣夫陰喉者陰氣伏藏於內也其色青白黃其氣溫涼其舌軟必捲縮其胸寬其大小便自通利其面色青黃其內外腫處青亦復溫涼本色其眼黃其喉鏡內色淡其舌色白黃其陰分潮熱或微寒微熱其痰涎少其聲溫和其症則虛是乃陰喉也不可太用寒涼之藥宜重用元參瀉虛火為主看喉中辨臟色訣五臟者心肝脾肺腎也各載五形各形五色五形者金木水火土也五色者紅青黃白黑也相生者其病輕相剋者其病重假如其色紅則屬心其色青則屬肝其色黃則屬脾其色白則屬肺其色黑則屬腎此乃五臟中形見於五色也開其口一觀喉中形色即知其由何臟中發來相生者易治相剋者難醫此是傳授真口訣切勿視為等閒語辨毒攻臟訣毒攻心必狂言亂語毒攻肝其眼怒直視毒攻肺其聲嘶而咳嗽氣響毒攻腎其聲沉緩而啞毒攻脾頸上浮腫必結核此乃餘毒發來外用沖和散敷之則散不散則熟用針刺出膿血即愈以上系毒攻臟腑之症諺云毒攻臟腑為死症古人不治命由天認死症歌訣凡喉症無痰者不治痰響如雷者危氣聲如拖鋸者死聲啞者不治色如腥熟者死面黑神慘者死口噤者危齒腳肉包過牙者死怒目直視者死肚痛者死鼻內出血不止者死大便泄出黑色者死潮熱不退者危口動言語亂者死喉內生肉筍針刺不痛者死膿血不腥不臭者死氣出無收者死手不能提足不能步者死滿喉盡膜者不治氣臭者死腣中子白膜遮盡者死牙齒脫者不治失舌者死痰火升喉痛者不治瘰癧火升喉痛者不治以上皆死症百中可救一二而已治咽喉辨論夫咽喉之症皆由五臟六腑發來臟腑生病其形色見於咽喉腣中以內者謂之咽腣中以外者謂之喉咽喉形色各有陰陽虛實之毒卒然發起牙關緊急痰涎壅盛氣出不收朝發夕死是乃急症醫者不明往往謂此為痰熱孰不知有陰陽虛實之分外症為陽內症為陰虛則溫之實則瀉之有熱去熱有風去風有毒解毒有膜去膜有痰化痰有涎去涎關閉用開關藥至內面紅黃白爛點可用藥散吹之外面紅腫結核則用藥散敷結核成膿用針刺審症用藥勿慌忙此真口訣也論喉症治法火症喉痹悉宜以抽薪飲主之火不勝者宜徙薪飲主之凡膽肝之火盛者宜以芍藥梔子草龍膽為主陽明胃火盛者宜以生石膏為主大便閉結不通宜加大黃芒硝之屬通其便而火自降凡火浮於上而熱結於頭面咽喉者最宜清降切不可誤用升陽散風等劑蓋此火由中發來得升愈熾經曰高者抑之正此之謂也非火鬱宜發及升陽散火之義學者於此最要體察勿謂誤認其面目為囑凡外治火症腫痛之法宜以木鱉子磨醋用鵝毛蘸擦喉中引去其痰或另少和清水免致太酸時時呷嗽喉中不可咽下引吐其痰為更喜嗽後以代匙散吹之仍內服湯藥自無不愈凡火壅於上而食物之治最宜梨漿緑豆湯之屬為妙若南方少梨之處或以好蘿蔔搗汁和以泉水少加元明粉攪勻徐徐飲之既可消痰亦可清火凡單雙乳鵝若毒未甚膿未成者治之自可消散若勢甚而危必須砭出其血庶可速退此因其急亦不得已而用之也又古法治喉痹用三針刺少商穴血出即愈陰虛喉痹其症亦內熱口渴喉干或唇紅頰赤痰涎壅盛然必六脈無神或六脈雖數浮軟無力但察其過於酒色或素稟陰氣不足多倦少力者是皆腎陰虧損水不制火而然火甚者滋陰八味煎加減一陰煎之類主之火微而不喜冷物及大便不硬小便不熱者宜六味地黃湯一陰煎之類主之若思慮焦勞兼動心火者宜用二陰煎主之格陽喉痹由火不歸元則無根之火寓於咽喉而然其症在上熱下寒全非火症凡辨此者但診其六脈微弱全無滑大之意則下體全無火症而腹不喜冷即是症也蓋此症必因色欲傷精所致或泄瀉傷腎或本無實火而過服寒涼以傷陽氣者皆能患此症速宜用鎮陰煎治之為上八味地黃湯次之或用蜜附子含咽亦可若再用寒涼之劑多致不救陽虛喉痹非喉痹因於陽虛也乃陽虛因於喉痹也蓋有因喉痹過於用攻擊之劑致傷胃氣者有飲食難下倉庫空虛而傷胃氣者又有氣體素弱不耐勞倦而傷胃氣者大凡中氣內虛疼痛外逼多致元陽飛越脈浮而散或弱而澀以致聲如鼾睡痰如拽鋸者此胃肺垂絶之候速宜挽回元氣以人參一味濃煎放心徐徐咽下如痰多者或加竹瀝薑汁亦可如遲多致不救若作實火治之則禍不旋踵矣格陽喉痹但見其頭面浮火喉頭粗極氣急聲啞咽腫口瘡痛楚之甚察其脈細甚而數問其言則聲微似不能振者詢其所服之藥無非黃連梔柏之屬此蓋以傷陽而起復為寒涼所逼以致寒盛於下而格陽於上即茶水之類亦俱難入口而尤畏煩熱余曰危哉再遲日子必不能救矣遂以鎮陰煎泡好以冷水座冷徐徐使咽之甫服一劑須早而頭頂腫痛盡消遂繼用五福飲之類數劑而愈疑者始皆駭服矣喉痹痛大概痰火所致急者宜吐痰後復下之上下分消而愈又甚者以針刺去血然後用藥吐之此為治之上策若人畏懼而委曲旁求瞬息喪命蓋治喉痹之法與救火同不容少待內經曰發之發之者發散也吐中有發散之義出血者亦發散之端也治斯痰者毋執緩方小方而治之如曰吾藥乃王道不動臟腑若遇疾之輕者可獲愈疾之重者因循死矣豈非誤殺耶喉癬症凡陰虛勞損之人多有此病其症滿喉生瘡紅腫疼痛久不能愈此實水虧虛火症也宜用前陰虛喉痹之法治之若多咳嗽肺熱宜以四陰煎之類治之若滿喉生瘡破爛而痛者宜用牛黃益金散吹敷之仍內服滋補真陰之劑自可痊愈瘟毒喉痹乃天行瘟疫之氣其症則咽喉項腫甚有頭面頸項俱腫者北方尤多此病俗呼為蟆瘟又名鸕鷀瘟亦名大頭瘟此濕熱壅盛最凶之候宜清諸經之火或瀉陽明之熱當察緩急而治之東垣有普濟消毒飲專治瘟毒喉痹百發百中伏氣之症古方謂之腎傷寒謂非時有暴寒中人毒氣伏於少陰腎經始初不病旬月乃發脈微弱法當以傷寒治之非喉痹之病也次非下利不可按此症亦所常有是必以少陰少陽之火令太陽之寒令太陰之濕復兼令風寒之邪者皆有此症故治此者不必治喉痹但治外邪其喉自愈即如新方之柴胡飲及散陳諸方皆可隨宜酌用楊梅結毒有喉間潰爛作痛久不愈者此非喉痹之屬乃楊梅瘡毒也宜用仙遺糧湯甚者宜以土茯苓煎湯吞五寶丹治之虛損喉痹未易辨也若一人因患虛損更兼喉癬腫痛多醫罔效余診其脈則數而無力察其症則大便溏泄問其治則皆退熱清火之劑然愈清火而咽愈痛余察之既確知其本非實火而且日前多用寒涼以致肚痛不實總亦格陽之類也遂專用理陰煎及大補元氣煎治之而愈鎖喉風症時人以咽喉腫痛飲食難入或痰氣壅塞不通甚奇甚急者皆稱為鎖喉風而不知有真正鎖喉風其甚奇甚急之處而實人所未知也余在襄陽嘗見一女子年已及笄忽一日在於仲秋時無病而喉竅澀愈甚及延余診視按其脈無火也問其喉無腫無痛也觀其貌則面青目瞪不能語也聽其聲則喉竅若細如針抽息之窘如線伸頭掙命求救之狀甚可憐也豫見而疑之不得其解然意謂風邪閉窒喉竅非用辛溫不能解散遂用二陳湯加生薑煎而與之服毫忽無效意復用獨參湯以救其肺然見勢危若此恐滋怨謗終亦未敢下手他醫見之亦但束手而已如此者一日夜而歿後又一人亦患此症而歿若此二人者余及今莫識其所以病此畢生之疑竇殊自愧也然意必肺氣竭絶之故倘值此者恐非獨參湯決不能救故特書此以俟後之君子詳酌焉諸物鯁於喉中或刺或骨必有鋒芒之逆所以刺礙而不下凡下而逆者後而上之則順矣故治此者當借飲食之勢湧而吐之使之上出則如拔刺之捷也若芒刺既深必難推下非惟理勢不順必致遲延或飲食既消無可推還以致漸腫則為害非細矣凡諸骨鯁或以飴糖一大塊滿口吞而咽之或用韭菜炙熟不可切斷作一小束吞之芒刺即裹而下亦妙小兒口中誤吞鐵釘痛甚余以磁石七錢朴硝二錢熟豬油二兩加蜜糖調和藥末與之食次日其鐵隨糞出是誠可謂良方矣論分經治喉症藥性瀉心火用黃連瀉肺火用黃芩脾火須用芍藥胃火定宜石膏柴胡瀉平肝火知母瀉平腎火木通瀉平小腸之火黃柏瀉膀胱火大黃瀉大腸火屈抑之火生梔為君浮游之火元參為妙上焦有熱黃芩赤芍中焦有熱黃連梔子下焦有熱黃柏知母上焦有寒麻黃桂枝中焦有寒肉桂乾薑下焦有寒附子沉香梔子黃連麥冬犀角俱清心黃芩桑皮羚羊俱清肺柴胡白芍膽草青黛俱平肝知母黃柏瀉腎火白芍石膏黑梔甘草俱瀉脾火連翹牛蒡能解毒黃芩花粉能解痰涎防風荊芥薄荷秦艽羌活俱祛風除濕退潮熱化痰口苦用膽草口渴葛根提毒用升麻去膜用蟬蛻涼血須生地血中伏火丹皮澤瀉去口臭人中黃痰盛牛黃開關殭蠶全蠍載藥上浮能達氣而下行者惟桔梗止熱嗽黃芩桑皮止風咳麻黃杏仁止痰嗽貝母連翹止虛咳阿膠白醋能解咽喉諸毒射干豆根能和諸藥解百毒甘草排膿白芷南星發散荊皮獨活打穿出膿則穿山甲治喉用藥變化歌訣治喉甘桔是神方細心體察辨陰陽柴胡芍藥平肝木不論心肺也備嘗黃芩同用桑皮是加用花粉效非常防風荊芥能逐風去膜蟬蛻用之良喬蒡解毒痰俱化驅風提毒升麻當生地等件須無膜豆根少許最為良連梔犀角有時用實熱無膜可主張六味品中除棗肉審症用藥莫慌忙連射丹梔雖難缺孕婦遇之要謹防此歌訣須讀至爛熟為要抽薪飲治諸火熾盛而不宜補者黃芩石斛木通梔子炒黃柏各三錢枳殼一錢半生甘二錢熱在肌膚經絡加連翹花粉熱在血分大小腸加槐花黃連熱在陽明頭面燥煩便實者加石膏熱在下焦小水痛澀加草龍膽車前熱在陰分津液不足加麥門冬生地芍藥徙薪飲治三焦火症大凡一切內熱漸覺而未甚者先以此劑服之如火甚者宜用抽薪飲陳皮分黃芩二錢白芍茯苓丹皮黃柏各錢半滋陰八味湯治陰虛火盛下焦濕熱等症淮山藥四錢丹皮三錢白雲苓三錢茱萸四錢澤瀉三錢黃柏鹽水炒三錢熟地八錢知母鹽水炒三錢一陰煎治水虧火盛之劑生地二錢熟地二錢芍藥二錢麥冬二錢牛膝錢半丹參二錢甘草二錢火盛躁煩加龜板氣虛加人參心虛不眠多汗加棗仁當歸汗多煩躁加五味子茱萸微有火者加女貞子虛火上浮吐血衄血不止者加澤瀉茜根或加川續斷澀之亦可加減一陰煎治症如前但火盛者宜用此方生地白芍麥冬各二錢熟地三錢地骨皮一錢炙草五七分知母一錢煩躁便結加石膏小水熱澀加梔子火浮於上加黃芩澤瀉血燥血少加當歸二陰煎治心經有熱水不制火之病生地二錢麥冬二錢棗仁一錢元參錢半川連三錢茯苓錢半木通錢半生甘一錢鎖陰煎治陰虛於下格陽於上真陽失守之病熟地二兩牛膝二錢澤瀉錢半清花桂二錢附子五七分或一二三錢炙草一錢如嘔惡加乾薑一二錢氣脫倦言而脈微弱者加人參四陰煎治保肺清肝有陰虛勞損相火熾盛等症生地一二錢麥冬二錢白芍二錢茯苓錢半百合二錢生甘一錢沙參二錢理陰煎熟地三五七錢或一二兩當歸二三錢或五七錢乾薑一二錢炙甘一二錢或加用上好肉桂亦可大補元煎黨參一二錢熟地二三錢淮山炒二錢杜仲二錢當歸二三錢枸杞二三錢炙甘一二錢茱萸一錢如元陽不足多寒者將本方加以附子炮薑片肉桂氣虛加黃耆白朮血滯去茱萸加川芎滑泄加故紙五味子普濟消毒散治疫厲惡寒壯熱頭面腫盛目不能開氣上喘促咽喉不利口舌乾燥等症東垣曾以此方治大頭病獲愈者以萬計黃芩五錢黃連五錢人參三錢橘紅二錢元參二錢桔梗二錢柴胡二錢薄荷一錢連翹錢半牛蒡錢半豆根一錢馬屁勃一錢白殭蠶一錢炒升麻一錢生甘二錢以上各藥共為細末半用白湯時時調服半用蜜丸噙化服盡即愈或加防風川芎當歸薄荷細辛水二盅煎一盅服可令熱速消或熱極腫甚先用刺出其血亦效一方無人參十二味玄翹飲治白喉初起絶妙方元參三錢連翹錢半山豆根錢半銀花錢半桔梗錢半銀柴胡一錢牛蒡錢半蟬蛻一錢去頭足升麻一錢花粉錢半馬蹄香即沉香錢半生甘一錢煎水服治喉內無論兩傍上下生有白膜是乃白喉玉腣中如有白膜即難治矣務要急宜調治使毒不得攻於內臟或有回生之望初用沙參三錢麥冬錢半去心赤芍錢半連翹錢半牛蒡子錢半銀花錢半生甘一錢桔梗二錢蟬蛻去頭足一錢柴胡一錢山豆根錢半葛根錢半知母錢半馬蹄香即沉香二錢花粉錢半煎水服治白喉潮熱漸除白膜漸減方元參三錢半麥冬錢半去心白芍錢半叉斛