咽下便愈青梅丸大南星十二個半夏二兩白礬一兩甘草兩半桔梗兩半陳皮五錢朴硝二兩提過青梅子一百個生鹽四兩先將補硝研末醃梅兩日等梅汁出後方將前藥末摻勻曬乾以瓷瓶收貯遇有鵝喉及牙痛喉痛取梅一個含之立消治陰白喉症散人中白二錢兒茶一錢黃柏六分青黛六分薄荷六分硼砂六分蟬蛻七個大梅片五分共研極細末如塵瓶收勿泄氣聽用治鵝喉口內含藥方荊皮二錢花粉錢半白芷一錢山豆根錢半七里香二錢馬蹄香即沉香三錢用滾水二碗泡燉濃另倒開半杯和白酒少許不拘時含至滿口痰涎即吐出洗口散五倍子二錢硼砂錢半白礬一錢共研細末每用數分以白開水泡出味軟綢蘸洗如有出牙血不止者用此湯含口中其血即止三黃散治陽症用大黃一兩黃柏五錢生甘五錢羌活三錢陳皮二錢梔子三錢地骨皮二錢青黛二錢共研末調白酒外敷患處洪寶丹治陽症用花粉三錢赤芍二錢薑黃一兩白芷一兩共為末或用黃酒或白酒或清茶調勻多熱敷之陽毒散生南星三錢蒼朮錢半薑黃二錢川貝二錢白芷二錢大黃四錢雄精三錢黃柏二錢生甘二錢防己二錢花粉三錢赤小豆二錢豆根二錢毛茨姑二錢去淨毛共研末調蜜糖清茶敷患處治陽喉毒紅腫方荊芥一兩花粉八錢白芷六錢大黃六錢七里香七錢芙蓉花八錢共研末調白酒在核處搽之略干又搽十餘次即愈沖和散治陰症用荊皮一兩獨活五錢赤芍五錢白芷三錢南星錢半半夏錢半南木香二錢菖蒲二錢共研細末調白酒敷黃龍散治陰症用草烏二兩薑黃二兩南星一兩赤芍一兩肉桂五錢去皮共為末調黃酒敷患處治陰毒青腫皮膚不燒熱方生川烏六錢生草烏六錢生南星五錢生半夏五錢生梔仁七錢芙蓉花一兩七里香七錢細辛五錢白芷六錢紅蓮花八錢菖蒲五錢生香附五錢共研末在核處搽兩宜散半陰半陽冷熱不明者用此治之荊芥獨活赤芍白芷菖蒲各等分共為末用黃酒調敷患處若瘡面上有血疱不可用菖蒲恐破瘡皮宜先用四味敷之後用菖蒲末敷於面上覆過四圍而以薄紙隔截之凡敷末藥須溫熱方能令藥氣透入若干再換濕者敷之如四圍黑暈不退瘡口俱無色者其人必服涼藥太過不可驟用黃龍散因其膚肉未死恐黃龍散藥力過峻敷上更加苦痛可於本方內加肉桂當歸以換起死血血一浮面即除去二味只用本方治之若痛不止可取酒泡乳香沒藥以瓦器盛放火上俟溶化乘熱傾入藥內調勻塗之痛立止若瘡口有突肉箭起宜以本方加南星用薑汁和酒調塗即落此因胃著風故也或有近熱之症可合洪寶丹以蔥汁清茶同調敷若遇陰寒之症可合黃龍散調好酒敷之制西瓜硝覓上號頭藤西瓜或一個或二個用稻柴墊好放在乾燥廚內立冬日將瓜挖去腹中穰取去七分皮上肉剩三發每瓜用皮硝二斤或半斤看瓜之大小酌用蓋好用線絡住懸向背陰屋檐下至冷凍之期其硝自盡出瓜外顏色如霜用刷帚輕輕拂下以盤盛之包好至三五日一取至春間將瓜內所剩之硝安好候到立冬將新鮮瓜盛之再加硝半斤或一斤仍舊懸好俟皮外飛出取之如此二次中間之硝亦不必再飛可治喉癬喉疳諸火症潰爛者吹之不痛外皮飛出者名銀粉雪其功可並紫雪鎖喉症吹之立效方鏡面硃砂飛一分正廉珠飛一分珊瑚飛一分雄精飛二分青黛二分硼砂二分人中白三分木槵子一分煅黑大梅片一分共研細末罐貯聽用經驗鵝喉奇方木槵殼存性五分鼻涕蟲三十條存性人中白五分山豆根取淨皮一錢黑竹蜂十六個存性川連一錢大梅片一分白硼砂五分生大黃一錢青黛二錢飛肥豬三十隻存性牛黃五分明礬二分麝香五釐共研末稱准分兩再合研一二千下罐貯封口勿泄氣聽用鵝喉急救方茜草一兩二錢七分醋一碗共蒸出味與病人吞噬一口牙關緊閉亦立開治各種喉症效方人中白飛過三分青缸花飛過三分明珍珠甘草豆腐煮過研飛五分黑竹蜂十個鹽醃年久者佳用新瓦一片焙蘇研末飛琥珀五分飛珍珠五分天竺黃一錢正川連一錢大梅片二分共研細末後入冰片再研勻罐貯勿泄氣聽用治白喉症奇方此症喉中先紅後白鴨糞瓦上隔火焙枯研末白粥調服立效如發寒熱切忌表藥誤用殺人口部治口舌生瘡吳茱萸為末用醋搽腳心過夜即愈敷貼更妙又方生附子研末或用吳萸熱醋調敷兩腳心無論虛實火極神妙又方天門冬去心麥冬去心元參等分為末煉蜜丸為彈子大每含一丸雖數年不愈者亦斷根以生薑蘸蜜水揩洗用薄荷自然汁同白蜜調敷口唇生瘡日久不愈藍葉搗汁洗愈若因氣鬱生瘡用甑上倒汗水搽立效並治小兒疳或唇破生瘡瓦松生薑汁搗融入鹽少許敷之愈舌無故出血方花炒末摻又方香薷煎水含咽又木賊四錢煎水漱口即止舌長數寸方冰片研末搽即收又方番木鱉四個刮毛黃連一兩同熬浸舌舌瞪硬大閉咽喉皂礬五錢瓦焙紅放地上冷定研末摻之若其牙關緊閉用物撬開牙齒搽藥又方蒲黃一錢為末摻並治舌上出血治羊鬚瘡奇效方羊須煅存加冰片少許麻油調搽即愈又方泡濃茶一大碗以患處浸茶內半枝香久即痊加味甘桔湯甘草三錢桔梗二錢荊芥牛蒡炒貝母去心各一錢五分前胡一錢薄荷五分名加味甘桔湯盛者宜服加味甘桔湯紫袍散治十八種喉風青黛水飛石青雄黃各一兩膽礬三錢人中白硼砂元明粉各五錢黃連二錢真冰片五分共為細末瓷罐收貯勿令泄氣急時以二三分吹喉愈甘桔湯治風熱上攻咽喉疼痛及喉痹妨悶苦梗一兩甘草二兩炒上每服二錢水煎此又一方也玉龍散人中白一錢煅硼砂一錢竹蜂四隻在竹內黑色者是也青黛五分元明粉一錢川連一錢山豆根一錢共為細末取少許以銅管吹之金鑰匙治喉閉纏喉風痰涎壅塞盛者水漿難焰硝一兩五錢硼砂五錢腦子一字殭蠶一錢雄黃二錢各另為末和勻以竹管吹患處痰涎即出如痰雖出咽喉仍不消急針患處去惡血頰車開不能合用皂角末吹其鼻嚏出自合下頰落含烏梅一個即止舌菌生舌上出血不止即不救五倍子一錢炙研烏梅去核炙研一錢銅緑三分共研細末搽菌上小膏蓋住日換一次愈後乃止上疳瘡口中爛方舊土牆上白螺獅殼不拘多少用水洗去泥沙燒灰存性香油調末搽之數次即愈若牙關齦腫爛口閉者用皂角末吹之即開上疳方上疳者喉疳牙疳口疳瘡等症也同用此方輕粉一錢硃砂七釐半冰片二分共研細末吹入口內無有不效臨吹先用薄荷湯或茶漱口愈後用銀花二錢土茯苓五錢甘草一錢服數次消瘰癧丸奇效方元參蒸牡蠣微煅醋淬貝母去心各六兩共為末蜜丸每服三錢開水下日二服已潰者九制首烏研末蜜丸每服三錢開水下日二服外以羊屎杏仁各五錢燒研細末豬骨髓調搽又方用鴨油調半夏末敷之舌下腫痛即重舌之類蒲黃五錢煎濃汁去渣含口中數次極效舌下痰包用無雜色的白馬糞放新瓦上焙乾研末加頂上梅花冰片為末敷上立愈小舌生紅泡子與喉症不同蛇床子二兩罐內燒煙吸入喉中自消補斷舌法凡人偶含刀在口斷舌已垂落而未斷者用雞蛋內白軟皮套住另以天花粉三兩赤芍二兩薑黃白芷各一兩為末蜜調塗舌根以白蜜調白蠟稀稠得宜敷在雞蛋皮上口敷數次三日舌自接住去蛋皮再用蜜蠟勤敷七日如跌撲穿斷舌心血出不止以鵝翎蘸米泔頻刷斷處其血即止或用瘦豬肉片貼之仍用蒲黃杏仁硼砂少許為末蜜調成膏噙化而安又方活蟹一個炙乾為末敷上即能生肌又方活蟹燒灰乳香沒藥各二錢塗之即生肉如咬去唇舌用川烏草烏為末攤紙一條以涼水調合貼之即不覺痛宜預製備急治舌下腫痛欲死皂角二錢瓦上焙紅研末好醋調敷即愈又方醋調百草霜柴灶內的敷舌上下數次效加鹽用井水調塗更佳重舌鵝喉川連雄黃各四分冰片二分共研末吹入喉風舌大如脬不急救即死冰片一分火硝三分青黛二分膽礬二分殭蠶五分硼砂三分共為末吹之舌腫四方皂角不拘多少以新瓦火煅至紅色放地候冷研細將病人用鐵鉗拘開牙齒以藥末搽其舌上即活又方百草霜和酒塗舌下又方用生蒲黃研末搽之又方用雞冠血塗舌上咽下即消喉疔形似靴釘但差長耳先以小刀刺點隨用紫袍散吹之再服加味甘桔湯加鮮菊花一兩用根亦可若不能刺以冰硼散箸頭蘸點六七次再吹藥服藥亦效舌忽縮入銀針刺破舌尖出盡惡血以蠟燭油搽之即愈舌硬生衣犀牛黃硃砂各一分玄精石二兩共研細末將舌尖刺出紫血用此藥搽之即愈舌下重生小舌舌根肉壅腫疊出短小如舌者是用黃柏和竹瀝泡一夜取汁點之又方巴豆半粒飯四五粒共搗爛為餅如黃豆大貼在印堂中待四圍起泡去之即愈各項舌病皆效木舌舌尖腫大塞滿口中直硬如木不能轉動者是用萆麻子肉搗爛以紙取油將紙搓條點火吹滅以煙向舌熏之即消若舌下腫起用銀針挑破出血以鍋墨煙以燒草者更佳以麻油厚調敷之脫去再敷或用水調敷亦可又方蒲黃研末時敷舌上其腫自消又方殭蠶為末吹入吐痰甚效舌忽腫大腫硬即時氣絶名曰翣舌用皂礬同上舌腫四方並治舌上生菌此惡症也初起如豆漸大如菌疼痛紅爛無皮朝輕暮重由心脾熱毒所致硼砂人中白各五分瓦上青苔瓦松溏雞糞各一錢用傾銀罐子二個將藥裝入封固外用鹽泥封好以炭火煅紅待三炷香為度候冷開罐取出入頂上梅花冰片麝香各一分共研細末臨用時先以磁針刺破血菌用藥少許點之再以蒲黃末蓋之內服二陳湯加黃連黃芩薄荷煎服舌腫破爛黃連黃柏各五分青黛水飛一錢冰片一錢焙乾為末每用三分吹之自愈重舌脹腫重舌木舌皆屬心火用川連末一錢燈草湯下二服效又方治重舌脹用鐵鍋燒紅打下鏽研末水調噙之牙部牙癰此症發在牙關牙床結核已成或左或右耳底有痛接上下左右照經絡治之有腫要外敷切忌齒落落則不治牙疔此症起於牙腳下生有黑點是腎經發來之毒宜先用黃連消毒散後用滋陰降火等藥治之外用硼砂石膏甘草共研細末擦之即愈牙疳此症起在牙床名走馬牙疳最忌齒落落即不治宜依上經絡治之內擦以玉龍散或冰硼散牙瀉即牙根流血草決明煎水含數次即愈又方苦參枯礬各等分為末擦牙即效治牙痛不可忍火硝硼砂冰片共為末擦患處即愈治牙痛方上好真清花肉桂切薄片每用一分嚼患處立刻止痛如桂不佳者嚼之增痛玉帶膏生真龍骨二兩宮粉一兩五錢頂上大梅片二錢五分麝香二錢五分淨黃蟬二兩真硼砂二錢五分陳黃蠟將上五味研細末和勻聽用先將黃蠟隔湯化溶入前藥末攪勻用棉紙將藥傾上用竹刀刮勻剪作一小指寬一寸長收貯瓷瓶內封固聽用治各種牙痛妙方隔夜濃茶每早起以之嗽口永無牙患金星追涎丹治風火牙痛並治蟲方薄荷一兩川椒五錢細辛一兩樟腦一兩共研細末放銅鍋內上以瓷碗一個蓋之文武火煉取霜用苦瓜霜火硝二錢半青黛五錢檳榔衣一兩煅黑共研末先將大苦瓜一個蒂旁切落一片納藥於內掛當風處俟皮上起白霜取貯聽用牙齒疼痛方秋絲瓜藤一兩槐花三錢薄荷一錢五分細辛八分淨水煎濃汁含嗽四五次效治牙痛奇妙極效方好汾酒一小茶杯入花椒一撮用火點著俟燒至一半將火吹息略候半刻乘火熱含於口內立即吐出其患立愈治牙出血方生地三錢元參三錢麥冬一錢五分白芍一錢五分女貞三錢丹皮一錢五分澤瀉一錢知母一錢五分鹽柏一錢五分碎補二錢五分連翹一錢五分沙參三錢生甘一錢如陰虛火旺出血將方內沙參黃柏二味除卻加熟地五錢叉斛一錢五分洋參二錢服之立效治牙出血有頭痛潮熱方生地三錢五分元參三錢麥冬一錢五分山藥一錢五分女貞子三錢丹皮錢半澤瀉一錢知母錢半鹽柏分半北沙參三錢五分銀柴胡八分連翹錢半碎補錢半石膏二錢半牛蒡錢半生甘一錢共煎水服效蟲牙作痛五焙子煎濃汁含嗽數次其蟲立死治蟲牙方生田雞去皮含在患處另以清水一大碗放在桌上良久俟口涎流出吐在碗中可於水內觀蟲大小均見如此數次永無此患治齒長數寸真白朮人乳拌蒸服之愈治牙齒長出分余用生地黃含之最妙治走馬疳此症口臭牙上爛流涎唇下如羊須生大黃三錢丁香十粒緑豆一錢共研末熱醋敷兩足心最效若兼以真珍珠吹之更妙治走馬疳人中白二兩煅紅兒茶一兩黃柏六錢南薄荷六錢真青黛六錢大梅片三錢研末先用溫湯嗽洗吹藥患處數次內服銀柴胡煅蘆薈胡黃連川連牛蒡子炒元參桔梗山梔子熟石膏薄荷羚羊角各五分水二盅煎服治牙疳妙方咸馬腎子並水含後吐卻再服水一盅即愈擦牙關兼去口中氣味大黃五錢甘杜香附去毛酒製白芷生石膏各五錢真川椒緑豆各四十九粒細辛三錢青果核十八顆煅淮鹽八兩火煅過絹篩用牙灰三兩飛曬乾共研細末過絹篩罐貯每日清晨以之擦牙不但永無齒疾且可白如冠玉取齒妙方活鯽魚一條重十兩以白砒一錢入腹內放無風無貓無犬處七日魚身發白色用雞翎拂毛以少許膏藥收之每遇病牙取少取膏藥貼齒片刻牙即落下脫牙白馬肉埋地內俟生蟲取出煅灰點牙即落牙痛奇方蠟梅花熬水含之愈又方檬果皮煲黑醋含之愈治各種牙痛經驗神方寬筋藤八分切薄片連殼雞蛋一隻用山水兩大碗煮數日滾將蛋去殼再煮至蛋極老去蛋及藤服之其痛立止又方用生小蛤一隻剖開去皮並頭足洗淨遍蘸雄黃末將蛤敷上患處合口含住俟覺腥悶難忍然後將口涎吐出其牙蟲隨涎出再含再吐以痛止蟲盡為度少商穴圖式左右皆同刺少商穴法穴在手大指內側去爪甲如韭菜葉刺入二分許以手自臂勒至刺處出血即消若重者及膿成者必須針患處否則不治也附骨鯁符咒第一句開天門第二句閉地戶第三句留人門第四句塞鬼道第五句穿鬼心第六句破鬼肚吾奉太上老君急急如律令左手持杯用香爐鼎手指盛杯杯內載茶用右手劍訣面向東方以畫第一畫念開天門第二畫念閉地戶第三畫念留人門第四畫念塞鬼道第五畫念穿鬼心第六畫念破鬼肚吾奉太上老君急急如律令附治鴉片煙飲奇效方服此方者一面吸烟一面服藥至八日十日後則可早可晏可多可少可吸可不吸妙在不用劫藥不用烟灰其飲自化應驗多多爰序於下鴉片煙流毒內地受害良多其中亦有急思改悔者又莫得其方市肆中藥於字義尚未辨明何能奏效縱有一二截止者類皆劫劑伐脾戕胃貽害多端譬諸作文安有講書未明而妄期佳構者乎即如字義世俗稱癮者乃皮里肉外之紅點何得指為斯證又稱引字究屬何根方為引動模糊圖治奚克見功不知所謂飲者乃飲食之飲即醫書所論痰飲證也夫濁者為痰清者為飲此理易知治斯證者總以滌飲化痰為主或問此證何由而生豫曰凡人酣吸多則動脾家之濕濕則生痰蓋脾為生痰之源肺為藏痰之器故此證總在脾肺二經或又問曰既系吸多生飲何以吸之又名曰過飲豫曰煙乃通活之性痰系周身上下無所不至一經土壅則或淚流或汗出或背脹或缺伸或嘔吐或心慌皆痰之為患驟得煙以通活則痰食頓開而諸證悉平斯謂之過飲客為首肯不勝欣然焉豫曰憫斯人之沉疴亟思拯救乃細揣各名家書體會數年始得其訣故特創一方藥品沖和純乎王道俾戒飲者自制不著絲毫烟灰自能奏效十餘年來獲益者不可枚舉因刊以公諸同好惟願普世共渡慈航回頭是岸云廣橘紅白礬炒五兩製半夏四兩五錢川椒七錢炙粉草三兩五錢天南星一兩五錢訶子一兩白芥子八錢塊雲苓四兩共研細末姜水泛為丸桐子大每日飯後一時之久以白滾水吞下三錢日二次服至八天以後自然見功奇效無比同治二年癸亥仲秋月上浣湖北黃岡屠燮臣制方付梓上系桂林蔣小峰於屠燮臣名道和輯刊醫學六種之普濟良方內摘録轉傳歷用經驗南豐趙獻卿吸烟已十八年日需煙六錢戊寅秋服是方旬日痰少煙減或偶多吸即行醉嘔平昔每吸必二十口乃過飲服藥兩旬每吸五口即得矣遂接服戒卻而痰盡面豐飲食倍常精神甚健足徵是方之果有益也因捐資梓印以廣其傳願得之者或堅信自服或轉傳濟人切勿疑怠則功德無量矣再者如服是方雖可一面吸烟然須心存力戒不可恃服藥而任意多吸乃有益也附急救服毒良方一凡誤吞洋烟急取廣東之木棉花絮稱准四錢用筆管夾之燒灰存性置茶碗中再取食鹽稱准二錢碾碎同置茶碗中開白水沖之攪勻灌下一刻間大吐黑水而愈在胃則吐在腸則瀉毒多或久則連服二三次吐瀉即愈一凡誤服滷水輕粉一切毒物急取木棉花絮六錢燒灰碾碎沖服不用食鹽一吐而愈一凡毒痢藥力不治者亦取木棉花絮六八錢燒灰用山楂一二錢紅糖一二錢煎服即愈以上諸法傳自江西已活人數千屢試屢驗近年京都有吞洋烟者亦此法全活多人其應如響伏願諸君子廣為傳布則功德無量矣
